<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fb923c"/>
      <stop offset="0.5" stop-color="#f97316"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="26" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.22"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <rect x="2" y="3" width="44" height="44" rx="11" fill="#92400e" fill-opacity="0.25"/>
  <!-- Background -->
  <rect width="48" height="48" rx="11" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="48" height="26" rx="11" fill="url(#shine)"/>
  <!-- V polygon: 6 points, arm width ~11px, converges to single tip -->
  <polygon points="7,12 18,12 24,34 30,12 41,12 24,40" fill="white"/>
  <!-- Ticket punch-holes on each arm -->
  <circle cx="13.5" cy="22" r="2.8" fill="url(#bg)"/>
  <circle cx="34.5" cy="22" r="2.8" fill="url(#bg)"/>
  <!-- Diamond accent at V tip -->
  <rect x="22.5" y="36" width="3" height="3" rx="0.8" transform="rotate(45 24 37.5)" fill="white" fill-opacity="0.5"/>
</svg>
